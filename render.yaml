services:
  - type: web
    name: valerie-tools
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: SMTP_HOST
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: info@saaswebpros.com
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        value: info@saaswebpros.com
      - key: PORT
        value: "3000"
